<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Stream for Frigate</title>
  <link rel="stylesheet" href="/style.css?v=__VER__" />
</head>
<body>
  <!-- Login -->
  <div id="login" class="login">
    <form id="login-form" class="login-card">
      <h1>Stream for Frigate</h1>
      <input id="username" type="text" placeholder="Пользователь" autocomplete="username" required />
      <input id="password" type="password" placeholder="Пароль" autocomplete="current-password" required />
      <button type="submit">Войти</button>
      <div id="login-error" class="error"></div>
    </form>
  </div>

  <!-- Player -->
  <div id="app" class="app hidden">
    <header class="topbar">
      <div id="cameras" class="cameras"></div>
      <div class="modes">
        <button id="mode-live" class="mode">LIVE</button>
        <button id="mode-archive" class="mode active">Архив</button>
        <button id="tl-open" class="mode mode-tl" title="Ускоренный обзор интервала">⏩ Обзор</button>
      </div>
      <div id="debug" class="debug"></div>
      <div id="status" class="status">—</div>
    </header>

    <div class="stage">
      <video id="video" playsinline muted></video>
      <img id="preview" class="preview hidden" alt="" />
      <div id="badge" class="badge hidden">LIVE</div>
      <button id="fs-btn" class="fs-btn" title="На весь экран">⤢</button>
    </div>

    <!-- Archive transport controls (hidden in live) -->
    <div id="controls" class="controls">
      <button class="ctrl seek" data-seek="-3600" title="Назад 1 час">«1ч</button>
      <button class="ctrl seek" data-seek="-600" title="Назад 10 минут">«10м</button>
      <button class="ctrl seek" data-seek="-60" title="Назад 1 минуту">«1м</button>
      <button class="ctrl seek" data-seek="-10" title="Назад 10 секунд (←)">‹10с</button>
      <button id="play-pause" class="ctrl ctrl-main" title="Пауза/Воспроизведение (Пробел)">⏸</button>
      <button class="ctrl seek" data-seek="10" title="Вперёд 10 секунд (→)">10с›</button>
      <button class="ctrl seek" data-seek="60" title="Вперёд 1 минуту">1м»</button>
      <button class="ctrl seek" data-seek="600" title="Вперёд 10 минут">10м»</button>
      <button class="ctrl seek" data-seek="3600" title="Вперёд 1 час">1ч»</button>
    </div>

    <div id="timeline-wrap" class="timeline-wrap">
      <div class="daynav">
        <button id="day-prev" class="daybtn" title="Предыдущий день">◀</button>
        <span id="day-label" class="day-label">—</span>
        <button id="day-next" class="daybtn" title="Следующий день">▶</button>
        <span id="clock" class="clock">—</span>
      </div>
      <div id="timeline" class="timeline">
        <div id="avail" class="avail"></div>
        <div id="future" class="future hidden"></div>
        <div id="playhead" class="playhead hidden"></div>
      </div>
      <div class="range"><span id="range-start">00:00</span><span id="range-end">24:00</span></div>
    </div>
  </div>

  <!-- Timelapse ("ускоренный обзор") modal -->
  <div id="tl-modal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head">
        <span>Ускоренный обзор</span>
        <button id="tl-close" class="modal-x" title="Закрыть">✕</button>
      </div>
      <div class="tl-form">
        <label class="tl-field">Конец интервала
          <div class="tl-end-row">
            <input id="tl-end" type="datetime-local" step="60" />
            <button id="tl-now" type="button" class="tl-mini" title="Подставить текущий момент">Сейчас</button>
          </div>
        </label>
        <label class="tl-field">Длительность (назад от конца)
          <div class="tl-dur-row">
            <input id="tl-dur" type="number" min="1" step="1" value="12" inputmode="numeric" />
            <select id="tl-dur-unit">
              <option value="60">минут</option>
              <option value="3600" selected>часов</option>
            </select>
          </div>
          <div class="tl-dur-quick">
            <button class="tl-q" type="button" data-h="1">1ч</button>
            <button class="tl-q" type="button" data-h="3">3ч</button>
            <button class="tl-q" type="button" data-h="6">6ч</button>
            <button class="tl-q" type="button" data-h="12">12ч</button>
            <button class="tl-q" type="button" data-h="24">24ч</button>
          </div>
        </label>
        <label class="tl-field">Ускорение, ×
          <div class="tl-speed-row">
            <input id="tl-speed" type="number" min="2" step="1" value="120" inputmode="numeric" />
            <div class="tl-speed-quick">
              <button class="tl-s" type="button" data-s="60">60</button>
              <button class="tl-s" type="button" data-s="120">120</button>
              <button class="tl-s" type="button" data-s="240">240</button>
              <button class="tl-s" type="button" data-s="480">480</button>
              <button class="tl-s" type="button" data-s="960">960</button>
            </div>
          </div>
        </label>
        <label class="tl-smooth"><input id="tl-smooth" type="checkbox" /> плавно (медленнее)</label>
        <div id="tl-summary" class="tl-summary">—</div>
        <div class="tl-actions">
          <button id="tl-view" class="tl-btn tl-primary">▶ Смотреть</button>
          <button id="tl-download" class="tl-btn">⬇ Скачать</button>
        </div>
        <div id="tl-status" class="tl-status"></div>
      </div>
      <div class="tl-player hidden">
        <video id="tl-video" controls playsinline></video>
      </div>
    </div>
  </div>

  <div id="version" class="version"></div>

  <script src="/app.js?v=__VER__"></script>
</body>
</html>
